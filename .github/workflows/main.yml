name: IPTV Guncelleme

on:
  push:
    branches:
      - main
  schedule:
    - cron: '0 */12 * * *' # 🚀 USTA: Artık tam 12 saatte bir otomatik çalışacak!
  workflow_dispatch: # Elle tetiklemek için

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Depoyu Klonla
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Python Kurulumu
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Kütüphaneleri Yükle
        run: |
          python -m pip install --upgrade pip
          pip install requests urllib3

      - name: IPTV Temizlik Kodunu Çalıştır
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python update_list.py

      - name: Değişiklikleri Kaydet ve Pushla
        run: |
          git config --local user.email "actions@github.com"
          git config --local user.name "GitHub Actions"
          git add tr.m3u
          git commit -m "IPTV Otomatik Güncellendi ($(date +'%d-%m-%Y %H:%M'))" || echo "Değişiklik yok, pass geçiliyor."
          git pull origin main --no-rebase --strategy-option=ours --no-edit
          git push
