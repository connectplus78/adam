name: IPTV Guncelleme

on:
  push:
    branches:
      - main
  schedule:
    - cron: '0 */12 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Depoyu Klonla
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Python Kurulumu
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Kütüphaneleri Yükle
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Python Scriptini Çalıştır
        run: |
          python update_list.py
          
      - name: Değişiklikleri Kaydet ve Pushla
        run: |
          git config --local user.email "actions@github.com"
          git config --local user.name "GitHub Actions"
          
          # Dosyanın varlığını kontrol et (HATA ÇÖZÜCÜ)
          if [ -f "tr.m3u" ]; then
            git add tr.m3u
            # Commit varsa at, yoksa atlama
            git commit -m "IPTV Güncellendi: $(date +'%d-%m-%Y %H:%M')" || echo "Değişiklik yok."
            git push
          else
            echo "KRİTİK HATA: Dosya oluşturulamadı!"
            ls -la  # Hangi dizinde olduğumuzu ve dosyanın yokluğunu loga döker
            exit 1
          fi
