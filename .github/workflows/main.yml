name: IPTV Guncelleme

on:
  push:
    branches:
      - main
  schedule:
    - cron: '0 */12 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Depoyu Klonla
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Python Kurulumu
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Kütüphaneleri Yükle
        run: |
          python -m pip install --upgrade pip
          pip install requests urllib3

      - name: IPTV Temizlik Kodunu Çalıştır
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python update_list.py

      - name: Değişiklikleri Kaydet ve Pushla
        run: |
          git config --local user.email "actions@github.com"
          git config --local user.name "GitHub Actions"
          
          # Dosya var mı ve git tarafından izleniyor mu kontrol et
          if [ -f "tr.m3u" ]; then
            git add tr.m3u
            # Commit mesajı boşsa işlem yapma
            git commit -m "IPTV Otomatik Güncellendi ($(date +'%d-%m-%Y %H:%M'))" || echo "Değişiklik yok."
            # Pushlamadan önce mevcut güncellemeleri al
            git pull origin main --rebase --strategy-option=ours
            git push origin main
          else
            echo "HATA: tr.m3u dosyası bulunamadı, işlem atlanıyor."
            exit 1
          fi
